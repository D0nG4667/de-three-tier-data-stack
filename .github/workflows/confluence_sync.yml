name: Confluence GitOps Sync

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'

jobs:
  confluence-sync:
    name: Sync docs to Confluence Cloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Sync Markdown to Confluence
        uses: gaurav-nelson/github-action-share-markdown-to-confluence@v3
        with:
          confluence_url: "https://uwe-bristol-air.atlassian.net/wiki"
          confluence_space: "${{ secrets.CONFLUENCE_SPACE_KEY }}"
          confluence_username: "${{ secrets.CONFLUENCE_EMAIL }}"
          confluence_password: "${{ secrets.CONFLUENCE_API_TOKEN }}"
          md_file_path: "docs/**/*.md"
          parent_page_id: "${{ secrets.CONFLUENCE_PARENT_PAGE_ID }}"
